<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wholeness">
<meta name="theme-color" content="#0e0e0e">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Wholeness Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --text-dim: #7a7570;
    --text-muted: #444;
    --accent: #c9a96e;
    --accent-soft: rgba(201, 169, 110, 0.12);
    --warn: #e07070;
    --warn-soft: rgba(224, 112, 112, 0.1);
    --good: #7cad8e;
    --good-soft: rgba(124, 173, 142, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    font-size: 14px;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px calc(80px + env(safe-area-inset-bottom)) 24px;
    padding-top: max(40px, env(safe-area-inset-top));
  }

  /* HEADER */
  .header {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .header-date {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    line-height: 1.1;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 36px;
    background: var(--surface);
    border-radius: 8px;
    padding: 3px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 6px;
    color: var(--text-dim);
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
  }

  /* SIGNAL BANNER */
  .signal-banner {
    background: var(--warn-soft);
    border: 1px solid rgba(224, 112, 112, 0.2);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.15s ease both;
    display: none;
  }

  .signal-banner.visible { display: block; }

  .signal-banner-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--warn);
    margin-bottom: 8px;
  }

  .signal-banner p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* SECTION */
  .section {
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* NEED CARD */
  .need-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 8px;
    transition: border-color 0.2s, background 0.2s;
  }

  .need-card:hover {
    border-color: #333;
  }

  .need-card.rated {
    border-color: rgba(201, 169, 110, 0.2);
    background: rgba(201, 169, 110, 0.03);
  }

  .need-card.low-rated {
    border-color: rgba(224, 112, 112, 0.2);
    background: rgba(224, 112, 112, 0.03);
  }

  .need-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .need-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  .need-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    line-height: 1.4;
    max-width: 380px;
  }

  .need-score-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text-muted);
    min-width: 28px;
    text-align: right;
    transition: color 0.3s;
  }

  .need-score-display.has-value { color: var(--accent); }
  .need-score-display.low { color: var(--warn); }

  /* RATING DOTS */
  .rating {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .rating-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-muted);
    transition: all 0.15s;
    background: none;
  }

  .rating-dot:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .rating-dot.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }

  .rating-dot.low.selected {
    background: var(--warn);
    border-color: var(--warn);
  }

  /* SIGNAL BEHAVIOURS */
  .signal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .signal-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .signal-item:hover {
    border-color: rgba(224, 112, 112, 0.3);
  }

  .signal-item.active {
    background: var(--warn-soft);
    border-color: rgba(224, 112, 112, 0.35);
  }

  .signal-check {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .signal-item.active .signal-check {
    background: var(--warn);
    border-color: var(--warn);
  }

  .signal-check svg { display: none; }
  .signal-item.active .signal-check svg { display: block; }

  .signal-label {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .signal-item.active .signal-label {
    color: var(--warn);
  }

  /* INSIGHT BOX */
  .insight-box {
    background: var(--accent-soft);
    border: 1px solid rgba(201, 169, 110, 0.2);
    border-radius: 10px;
    padding: 18px 20px;
    margin-top: 20px;
    display: none;
  }

  .insight-box.visible { display: block; }

  .insight-title {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .insight-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .insight-text strong {
    color: var(--text);
    font-weight: 400;
  }

  /* LOW COST SUGGESTIONS */
  .suggestions {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(201, 169, 110, 0.1);
  }

  .suggestions-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .suggestion-tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-dim);
    margin: 3px 3px 3px 0;
  }

  /* SUBMIT BUTTON */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 28px;
  }

  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* HISTORY VIEW */
  #history-view { display: none; }

  .history-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 12px;
    animation: fadeUp 0.3s ease both;
  }

  .history-day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    cursor: pointer;
  }

  .history-day-date {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .history-day-avg {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--accent);
  }

  .history-bars {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .history-bar-item {
    text-align: center;
  }

  .history-bar-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-bar-track {
    height: 40px;
    background: var(--surface2);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }

  .history-bar-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--accent);
    border-radius: 3px;
    transition: height 0.4s ease;
  }

  .history-bar-fill.low { background: var(--warn); }

  /* WELLBEING RING */
  .wellbeing-ring {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
  }

  .ring-svg { flex-shrink: 0; }

  .ring-text h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
  }

  .ring-text p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  /* COMPLETE STATE */
  .complete-state {
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.5s ease both;
    display: none;
  }

  .complete-state.visible { display: block; }

  .complete-icon {
    font-size: 40px;
    margin-bottom: 16px;
  }

  .complete-state h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 8px;
  }

  .complete-state p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 400px;
    margin: 0 auto 20px;
  }

  .view-history-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    transition: all 0.2s;
  }
  .view-history-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* OTHER SIGNAL INPUT */
  .other-signal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 8px;
    grid-column: 1 / -1;
  }

  .other-signal-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .other-signal-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .other-signal input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .other-signal input::placeholder { color: var(--text-muted); }
  .other-signal input:focus { border-color: rgba(201, 169, 110, 0.4); }

  .other-signal-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .other-signal-btn:hover { border-color: var(--accent); color: var(--accent); }
  .other-signal-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .other-signal-result {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: none;
  }

  .other-signal-result.visible { display: block; }

  .ai-thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
  }

  .ai-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .ai-dot:nth-child(2) { animation-delay: 0.2s; }
  .ai-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .other-signal-insight {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .other-signal-insight strong { color: var(--text); font-weight: 400; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-date" id="header-date"></div>
    <h1>How are you<br>tending to yourself?</h1>
    <div class="header-sub">A daily check-in for wholeness</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showView('checkin')">Today</button>
    <button class="tab" onclick="showView('history')">History</button>
  </div>

  <!-- CHECK-IN VIEW -->
  <div id="checkin-view">

    <div class="signal-banner" id="signal-banner">
      <div class="signal-banner-title">⚠ Signal detected</div>
      <p id="signal-banner-text"></p>
    </div>

    <!-- ALREADY DONE TODAY -->
    <div class="complete-state" id="complete-state">
      <div class="complete-icon">✦</div>
      <h2>Check-in complete</h2>
      <p id="complete-summary"></p>
      <button class="view-history-btn" onclick="showView('history')">View your history</button>
    </div>

    <!-- FORM -->
    <div id="checkin-form">

      <!-- SIGNAL BEHAVIOURS -->
      <div class="section" style="animation-delay: 0.05s">
        <div class="section-title">Signal behaviours today</div>
        <div class="signal-grid" id="signal-grid"></div>

        <!-- OTHER SIGNAL -->
        <div class="other-signal">
          <div class="other-signal-label">Something else?</div>
          <div class="other-signal-row">
            <input type="text" id="other-signal-input" placeholder="e.g. I've been snapping at people, I can't focus…" maxlength="200" onkeydown="if(event.key==='Enter') interpretOtherSignal()"/>
            <button class="other-signal-btn" id="other-signal-btn" onclick="interpretOtherSignal()">Reflect ✦</button>
          </div>
          <div class="other-signal-result" id="other-signal-result">
            <div class="ai-thinking" id="ai-thinking">
              <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
              <span>Reading your signal…</span>
            </div>
            <div class="other-signal-insight" id="other-signal-insight"></div>
          </div>
        </div>
        <div class="insight-box" id="signal-insight">
          <div class="insight-title">What your signals might be saying</div>
          <div class="insight-text" id="signal-insight-text"></div>
        </div>
      </div>

      <!-- NEEDS -->
      <div class="section" style="animation-delay: 0.1s">
        <div class="section-title">Rate each need today · 1 = unmet · 5 = well tended</div>
        <div id="needs-list"></div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitCheckin()">Save today's check-in</button>

    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="history-view">
    <div class="wellbeing-ring" id="wellbeing-ring">
      <svg class="ring-svg" width="72" height="72" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="28" fill="none" stroke="#2a2a2a" stroke-width="6"/>
        <circle cx="36" cy="36" r="28" fill="none" stroke="#c9a96e" stroke-width="6"
          stroke-dasharray="175.9"
          stroke-dashoffset="175.9"
          stroke-linecap="round"
          transform="rotate(-90 36 36)"
          id="ring-progress"/>
      </svg>
      <div class="ring-text">
        <h3 id="ring-label">No data yet</h3>
        <p id="ring-sub">Start checking in daily</p>
      </div>
    </div>
    <div id="history-list"></div>
  </div>

</div>

<script>
const NEEDS = [
  { id: 'delight', name: 'Delight', desc: 'Pleasure, beauty, sensory joy', suggestions: ['Free museum or gallery visit', 'Walk a route you\'ve never taken', 'Cook something you genuinely love', 'Watch the sunset or sunrise', 'Browse a market or car boot sale', 'Make yourself a beautiful meal at home', 'Find a new spot in a park and sit in it', 'Listen to an album all the way through', 'Light a candle and do nothing else', 'Forage for something interesting on a walk'] },
  { id: 'intellectual', name: 'Intellectual & Emotional Nourishment', desc: 'Reading, learning, stimulation', suggestions: ['Visit your local library', 'Listen to a podcast on a walk', 'Watch a free lecture or documentary', 'Read a chapter of something challenging', 'Look something up you\'ve always wondered about', 'Find a new essay or long-read online', 'Watch an art-house or classic film', 'Follow a curiosity down a Wikipedia rabbit hole', 'Listen to a philosophy or ideas podcast', 'Browse the free section of a bookshop'] },
  { id: 'satiety', name: 'Satiety & Comfort', desc: 'Having enough, living decently', suggestions: ['Meal prep something hearty and comforting', 'Tidy and reset one space in your home', 'Cook a slow, intentional meal', 'Make sure you\'ve eaten properly today', 'Batch cook to ease the week ahead', 'Sort one domestic thing that\'s been nagging you', 'Make your bed and change the sheets', 'Buy one small thing that makes life better', 'Brew a proper cup of tea or coffee', 'Create a cosy corner for yourself at home'] },
  { id: 'expression', name: 'Expression', desc: 'Sharing, making, journalling, dancing', suggestions: ['Journal freely for 10 minutes', 'Send a voice note to someone', 'Sketch, doodle, or draw without aim', 'Dance alone in your room', 'Work on your tarot deck project', 'Write a poem or a fragment of one', 'Take photos of something that moves you', 'Record yourself talking through something', 'Write a letter you may or may not send', 'Make something with your hands'] },
  { id: 'connection', name: 'Connection', desc: 'Meaningful, mutual interaction', suggestions: ['Text or call someone you genuinely like', 'Arrange a walk or coffee with a friend', 'Write a proper message to someone you miss', 'Say yes to an invitation you\'d normally skip', 'Have a real conversation with a colleague', 'Join a group activity or class', 'Reach out to someone you haven\'t spoken to in a while', 'Invite someone to do something simple together', 'Spend time with someone who energises you', 'Go somewhere sociable even briefly'] },

function interpretOtherSignal() {
  const input = document.getElementById('other-signal-input');
  const btn = document.getElementById('other-signal-btn');
  const resultEl = document.getElementById('other-signal-result');
  const thinkingEl = document.getElementById('ai-thinking');
  const insightEl = document.getElementById('other-signal-insight');
  const text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  resultEl.classList.add('visible');
  thinkingEl.style.display = 'flex';
  insightEl.innerHTML = '';

  // Small delay for a more considered feel
  setTimeout(() => {
    const lower = text.toLowerCase();
    let matched = [];

    // Score each rule by how many keywords match
    SIGNAL_RULES.forEach(rule => {
      const score = rule.keywords.filter(k => lower.includes(k)).length;
      if (score > 0) matched.push({ rule, score });
    });

    matched.sort((a, b) => b.score - a.score);
    const top = matched.slice(0, 2);

    let needIds, message;

    if (top.length === 0) {
      // Fallback: gentle generic reflection
      needIds = ['expression', 'solitude', 'being-known'];
      message = 'It\'s worth sitting with what you\'ve noticed. Sometimes the act of naming something — even to yourself — is a first step toward understanding what need is underneath it. Your needs for <strong>expression</strong> and <strong>solitude</strong> may be worth checking in on today.';
    } else {
      // Merge needs from top matches, deduplicated
      const needSet = new Set();
      top.forEach(m => m.rule.needs.forEach(n => needSet.add(n)));
      needIds = Array.from(needSet).slice(0, 4);

      if (top.length >= 2 && top[0].score === top[1].score) {
        // Two equally matched rules — blend messages
        message = top[0].rule.message + ' ' + top[1].rule.message.split('.')[0] + '.';
      } else {
        message = top[0].rule.message;
      }
    }

    thinkingEl.style.display = 'none';
    insightEl.innerHTML = message;
    activeOtherSignal = { text, needs: needIds, message };
    updateSignalBanner();
    btn.disabled = false;
  }, 600);
}
let storageKey = () => 'wt_' + new Date().toISOString().slice(0,10);

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

function init() {
  document.getElementById('header-date').textContent = formatDate(new Date());
  renderSignals();
  renderNeeds();
  checkAlreadyDone();
}

function checkAlreadyDone() {
  const saved = loadToday();
  if (saved) {
    showCompleteState(saved);
  }
}

function loadToday() {
  try { return JSON.parse(localStorage.getItem(storageKey())); } catch(e) { return null; }
}

function renderSignals() {
  const grid = document.getElementById('signal-grid');
  grid.innerHTML = SIGNALS.map(s => `
    <div class="signal-item" id="sig-${s.id}" onclick="toggleSignal('${s.id}')">
      <div class="signal-check">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5 3.5-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="signal-label">${s.label}</div>
    </div>
  `).join('');
}

function toggleSignal(id) {
  const el = document.getElementById('sig-' + id);
  if (activeSignals.has(id)) {
    activeSignals.delete(id);
    el.classList.remove('active');
  } else {
    activeSignals.add(id);
    el.classList.add('active');
  }
  updateSignalInsight();
  updateSignalBanner();
}

function updateSignalInsight() {
  const box = document.getElementById('signal-insight');
  const txt = document.getElementById('signal-insight-text');
  if (activeSignals.size === 0) { box.classList.remove('visible'); return; }
  box.classList.add('visible');
  txt.innerHTML = Array.from(activeSignals).map(id => `<p style="margin-bottom:8px">${SIGNAL_MESSAGES[id]}</p>`).join('');
}

function updateSignalBanner() {
  const banner = document.getElementById('signal-banner');
  const txt = document.getElementById('signal-banner-text');
  const hasAny = activeSignals.size > 0 || activeOtherSignal;
  if (!hasAny) { banner.classList.remove('visible'); return; }
  const highlighted = new Set();
  activeSignals.forEach(sid => {
    const s = SIGNALS.find(s => s.id === sid);
    if (s) s.needs.forEach(n => highlighted.add(n));
  });
  if (activeOtherSignal) {
    activeOtherSignal.needs.forEach(n => highlighted.add(n));
  }
  banner.classList.add('visible');
  txt.innerHTML = `The needs marked below may be particularly relevant today based on your signals.`;
  NEEDS.forEach(n => {
    const card = document.getElementById('card-' + n.id);
    if (!card) return;
    if (highlighted.has(n.id)) {
      card.style.borderColor = 'rgba(224, 112, 112, 0.25)';
    } else {
      if (!ratings[n.id]) card.style.borderColor = '';
    }
  });
}

function renderNeeds() {
  const list = document.getElementById('needs-list');
  list.innerHTML = NEEDS.map(n => `
    <div class="need-card" id="card-${n.id}">
      <div class="need-header">
        <div>
          <div class="need-name">${n.name}</div>
          <div class="need-desc">${n.desc}</div>
        </div>
        <div class="need-score-display" id="score-${n.id}">·</div>
      </div>
      <div class="rating" id="rating-${n.id}">
        ${[1,2,3,4,5].map(v => `
          <button class="rating-dot ${v <= 2 ? 'low' : ''}" id="dot-${n.id}-${v}" onclick="rate('${n.id}', ${v})">${v}</button>
        `).join('')}
      </div>
      <div class="suggestions" id="sugg-${n.id}" style="display:none">
        <div class="suggestions-title">Low-cost ideas</div>
        ${n.suggestions.map(s => `<span class="suggestion-tag">${s}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function rate(needId, value) {
  ratings[needId] = value;
  const card = document.getElementById('card-' + needId);
  const scoreEl = document.getElementById('score-' + needId);
  const suggEl = document.getElementById('sugg-' + needId);

  // update dots
  for (let v = 1; v <= 5; v++) {
    const dot = document.getElementById(`dot-${needId}-${v}`);
    dot.classList.toggle('selected', v === value);
  }

  // update score display
  scoreEl.textContent = value;
  scoreEl.className = 'need-score-display ' + (value > 0 ? (value <= 2 ? 'low has-value' : 'has-value') : '');

  // card state
  card.classList.remove('rated', 'low-rated');
  if (value <= 2) {
    card.classList.add('low-rated');
    suggEl.style.display = 'block';
  } else {
    card.classList.add('rated');
    suggEl.style.display = 'none';
  }
}

function submitCheckin() {
  const total = Object.keys(ratings).length;
  if (total < 5) {
    alert('Please rate at least 5 needs before saving.');
    return;
  }
  const data = {
    date: todayKey(),
    ratings,
    signals: Array.from(activeSignals),
    otherSignal: activeOtherSignal ? activeOtherSignal.text : null,
  };
  try { localStorage.setItem(storageKey(), JSON.stringify(data)); } catch(e) {}
  showCompleteState(data);
}

function showCompleteState(data) {
  document.getElementById('checkin-form').style.display = 'none';
  const cs = document.getElementById('complete-state');
  cs.classList.add('visible');

  const vals = Object.values(data.ratings);
  const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '—';
  const low = NEEDS.filter(n => data.ratings[n.id] && data.ratings[n.id] <= 2).map(n => n.name);
  let summary = `Average wellbeing today: <strong>${avg} / 5</strong>.`;
  if (low.length) summary += ` Needs that may need attention: ${low.join(', ')}.`;
  document.getElementById('complete-summary').innerHTML = summary;
}

function showView(v) {
  document.getElementById('checkin-view').style.display = v === 'checkin' ? 'block' : 'none';
  document.getElementById('history-view').style.display = v === 'history' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&v==='checkin')||(i===1&&v==='history')));
  if (v === 'history') renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const entries = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('wt_')) {
      try {
        const d = JSON.parse(localStorage.getItem(key));
        if (d && d.ratings) entries.push(d);
      } catch(e) {}
    }
  }
  entries.sort((a,b) => b.date.localeCompare(a.date));

  if (!entries.length) {
    list.innerHTML = '<p style="color:var(--text-dim);font-size:13px;text-align:center;padding:40px 0">No check-ins yet. Start today.</p>';
    document.getElementById('ring-label').textContent = 'No data yet';
    document.getElementById('ring-sub').textContent = 'Start checking in daily';
    return;
  }

  // Compute overall avg
  const allVals = entries.flatMap(e => Object.values(e.ratings));
  const overallAvg = allVals.length ? (allVals.reduce((a,b)=>a+b,0)/allVals.length) : 0;
  const pct = overallAvg / 5;
  document.getElementById('ring-progress').style.strokeDashoffset = 175.9 * (1 - pct);
  document.getElementById('ring-label').textContent = overallAvg.toFixed(1) + ' / 5';
  document.getElementById('ring-sub').textContent = `Across ${entries.length} check-in${entries.length>1?'s':''}`;

  list.innerHTML = entries.map(e => {
    const vals = Object.values(e.ratings);
    const avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
    const sample = NEEDS.slice(0,10);
    const bars = sample.map(n => {
      const v = e.ratings[n.id] || 0;
      const pct = (v/5)*100;
      return `
        <div class="history-bar-item">
          <div class="history-bar-label">${n.name.split(' ')[0]}</div>
          <div class="history-bar-track">
            <div class="history-bar-fill ${v <= 2 && v > 0 ? 'low' : ''}" style="height:${pct}%"></div>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="history-day">
        <div class="history-day-header">
          <div class="history-day-date">${formatDate(e.date)}</div>
          <div class="history-day-avg">${avg}</div>
        </div>
        <div class="history-bars">${bars}</div>
        ${e.signals && e.signals.length ? `<p style="font-size:11px;color:var(--warn);margin-top:12px">⚠ Signals: ${e.signals.map(s=>SIGNALS.find(x=>x.id===s)?.label||s).join(', ')}${e.otherSignal ? ` · "${e.otherSignal}"` : ''}</p>` : (e.otherSignal ? `<p style="font-size:11px;color:var(--warn);margin-top:12px">⚠ Other signal: "${e.otherSignal}"</p>` : '')}
      </div>`;
  }).join('');
}

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

init();
</script>
</body>
</html>
